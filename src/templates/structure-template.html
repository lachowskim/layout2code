        <!-- LiveServer reload fix script - run before anything else -->
        <script>
            // Clear any reload flags that might be causing issues
            try {
                sessionStorage.removeItem('isReloading');
                console.log("🛠️ Anti-reload loop protection active");
            } catch (e) {
                console.error("Failed to clear sessionStorage:", e);
            }
            
            // Create global helper
            window.fixReload = function() {
                console.log("🔄 Applying reload fix...");
                sessionStorage.clear();
                return "Session storage cleared - try refreshing now";
            };
        </script>
